version: '3.8'

services:
  db:
    image: postgres:16
    container_name: calorie-tracker-db
    environment:
      POSTGRES_DB: calorie_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:
